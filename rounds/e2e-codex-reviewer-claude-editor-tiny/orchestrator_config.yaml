spec_path: ./spec.md
history_path: ./spec.history.md
rounds_dir: ./rounds
declaration_path: ./convergence_declaration.md

clients:
  reviewer:
    name: codex
    command: codex
    version: "0.118.0"
    model: gpt-5.2
  editor:
    name: claude-code
    command: claude
    version: "1.0.47"
    model: claude-sonnet-4-6

review:
  max_rounds: 12

convergence:
  enabled: true
  target_phase: final
  target_mode: strict
  rubric_path: ./convergence_rubric.md
  max_rounds: 8
